<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Query Flow Chat</title>
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Motion One (Framer Motion for Vanilla JS) -->
  <script src="https://cdn.jsdelivr.net/npm/motion@10.16.2/dist/motion.js"></script>
  <!-- Markdown & Code Highlighting -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
  <style>
    :root {
      --bg-color: #030617;
      --card-bg: rgba(15, 23, 42, 0.7);
      --border-color: rgba(255, 255, 255, 0.08);
      --primary-color: #6366f1;
      --secondary-color: #8b5cf6;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --accent-glow: rgba(99, 102, 241, 0.2);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    h1{
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      color: white;
      opacity: 0.8;
    }

    /* Ultra-Premium Mesh Background */
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(circle at 20% 20%, rgba(99, 102, 241, 0.1) 0%, transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 40%),
        radial-gradient(circle at 50% 50%, rgba(15, 23, 42, 1) 0%, rgba(3, 6, 23, 1) 100%);
      z-index: -2;
    }



    .app-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
      position: relative;
      overflow: hidden; /* Lock height */
    }

    /* Chat Area */
    #chat {
      flex: 1;
      overflow-y: auto;
      min-height: 0; /* Critical for flex scroll */
      padding: 60px 20px 20px;
      scroll-behavior: smooth;
      display: flex;
      flex-direction: column;
      scrollbar-width: none; /* Firefox */
      -ms-overflow-style: none; /* IE/Edge */
    }

    #chat::-webkit-scrollbar {
      display: none; /* Chrome, Safari, Edge */
    }


    /* ChatGPT-Style Layout */
    .msg-wrapper {
      margin-bottom: 40px;
      display: flex;
      gap: 20px;
      width: 100%;
      opacity: 0;
      align-items: flex-start;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.7rem;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .user .avatar {
      background: #3b82f6; /* User Blue */
      color: white;
    }

    .ai .avatar {
      background: #10b981; /* AI Green */
      color: white;
    }

    .msg {
      flex: 1;
      line-height: 1.75;
      font-size: 1rem;
      color: var(--text-main);
      padding-top: 4px;
    }

    .msg.user {
      font-weight: 500;
    }

    .role-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
      color: var(--text-muted);
    }

    .user .role-label { color: rgba(255,255,255,0.7); }

    /* Composer / Input Area - Fixed at Bottom */
    .composer-wrapper {
      padding: 10px 20px 30px;
      z-index: 20;
    }

    .composer {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(20px);
      border-radius: 2rem;
      padding: 12px 8px 12px 20px;
      display: flex;
      align-items: flex-end; /* Button stays at bottom */
      gap: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .composer:focus-within {
      border-color: var(--primary-color);
      box-shadow: 0 10px 40px var(--accent-glow);
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text-main);
      font-family: inherit;
      font-size: 0.95rem;
      line-height: 36px;    /* Centers text vertically in single-line state */
      resize: none;
      outline: none;
      padding: 0;
      max-height: 200px;
      height: 36px;         /* Same as button */
      overflow-y: hidden;
    }

    button {
      background: var(--primary-color);
      color: white;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      flex-shrink: 0;
      align-self: flex-end; /* Always stays at bottom */
    }

    button:hover {
      background: var(--secondary-color);
      transform: scale(1.05);
    }

    button:active {
      transform: scale(0.95);
    }

    button:disabled {
      background: #334155;
      cursor: not-allowed;
      transform: none;
    }

    /* Icon */
    .send-icon {
      width: 18px;
      height: 18px;
      fill: currentColor;
    }

    /* Footer */
    .footer {
      padding-bottom: 10px;
      text-align: center;
      font-size: 0.65rem;
      color: var(--text-muted);
      opacity: 0.5;
    }

    /* Loading / Typing Indicator */
    .typing {
      display: flex;
      gap: 4px;
      padding: 4px 0;
    }
    .dot {
      width: 4px;
      height: 4px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }
    .dot:nth-child(1) { animation-delay: -0.32s; }
    .dot:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1.0); }
    }

    /* Markdown & Typography Refinement */
    .msg h1, .msg h2, .msg h3 {
      margin: 24px 0 12px;
      color: var(--text-main);
      font-weight: 700;
    }
    .msg h1 { font-size: 1.4rem; }
    .msg h2 { font-size: 1.2rem; }
    .msg h3 { font-size: 1.1rem; }

    .msg p {
      margin-bottom: 16px;
      line-height: 1.8;
    }

    .msg ul, .msg ol {
      margin: 0 0 16px 24px;
    }

    .msg li {
      margin-bottom: 8px;
    }

    .msg strong {
      color: var(--secondary-color);
      font-weight: 600;
    }

    /* Tables */
    .msg table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
      overflow: hidden;
    }
    .msg th, .msg td {
      padding: 12px;
      border: 1px solid var(--border-color);
      text-align: left;
    }
    .msg th {
      background: rgba(255,255,255,0.05);
      font-weight: 600;
    }

    /* Code Blocks */
    pre {
      background: #0f172a !important;
      padding: 20px !important;
      border-radius: 12px !important;
      margin: 20px 0 !important;
      border: 1px solid var(--border-color) !important;
      overflow-x: auto;
    }

    code {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 0.88rem;
      background: rgba(255,255,255,0.1);
      padding: 2px 6px;
      border-radius: 4px;
    }

    pre code {
      background: transparent;
      padding: 0;
    }

    .copy-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      font-size: 10px;
      padding: 4px 8px;
      border-radius: 6px;
      cursor: pointer;
      width: auto;
      height: auto;
      backdrop-filter: blur(4px);
    }

    .copy-btn:hover {
      background: rgba(255, 255, 255, 0.2);
      color: white;
    }

    /* Mobile Responsiveness */
    @media (max-width: 900px) {
      .header-content, .app-container {
        max-width: 100%;
        padding: 0 16px;
      }
      .msg {
        max-width: 90%;
      }
      .avatar {
        width: 32px;
        height: 32px;
      }
    }

    /* Sending State Animation */
    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
      100% { transform: scale(1); opacity: 1; }
    }
    button:disabled .send-icon {
      animation: pulse 1.5s infinite ease-in-out;
    }
  </style>
</head>
<body>



  <div class="app-container">
    <div id="chat" class="chat">
      <!-- Messages will appear here -->
    </div>

    <div class="composer-wrapper">
      <div class="composer">
        <textarea id="input" placeholder="Ketik pesan..." rows="1"></textarea>
        <button id="send" title="Kirim Pesan">
          <svg class="send-icon" viewBox="0 0 24 24">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
          </svg>
        </button>
      </div>
    </div>
    <div class="footer">Powered by Gemini AI Engine</div>
  </div>

  <script src="/static/app.js?v=4"></script>
</body>
</html>
